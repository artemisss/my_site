<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Королёв Артём</title>
  <style>
    :root {
      --text: #1d1d1f;
      --muted: #6e6e73;
      --bg: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      overflow: hidden;
      position: relative;
    }

    /* Едва заметные цветные блики на фоне — как стекло ловит свет */
    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.35;
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      width: 460px;
      height: 460px;
      background: radial-gradient(circle, #acd2ff 0%, transparent 70%);
      top: -120px;
      left: -100px;
      animation: float1 14s ease-in-out infinite;
    }

    body::after {
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, #ffd5ec 0%, transparent 70%);
      bottom: -160px;
      right: -120px;
      animation: float2 18s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, 30px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-30px, -40px); }
    }

    main {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 24px;
      animation: rise 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: clamp(2.6rem, 8vw, 4.5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    .role {
      margin-top: 18px;
      font-size: clamp(1.05rem, 3.5vw, 1.4rem);
      font-weight: 400;
      color: var(--muted);
      letter-spacing: -0.01em;
    }

    .role .accent {
      color: var(--text);
      font-weight: 500;
    }

    /* Liquid glass кнопка */
    .actions {
      margin-top: 44px;
    }

    .glass-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 30px;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.08),
        inset 0 1px 1px rgba(255, 255, 255, 0.9),
        inset 0 -1px 6px rgba(255, 255, 255, 0.4);
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.35s ease;
    }

    /* Скользящий блик */
    .glass-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        100deg,
        transparent,
        rgba(255, 255, 255, 0.65),
        transparent
      );
      transform: skewX(-20deg);
      transition: left 0.7s ease;
    }

    .glass-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow:
        0 10px 34px rgba(0, 0, 0, 0.12),
        inset 0 1px 1px rgba(255, 255, 255, 1),
        inset 0 -1px 6px rgba(255, 255, 255, 0.5);
    }

    .glass-btn:hover::before {
      left: 130%;
    }

    .glass-btn:active {
      transform: translateY(0) scale(0.99);
    }

    .glass-btn svg {
      width: 20px;
      height: 20px;
    }

    footer {
      position: absolute;
      bottom: 26px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      z-index: 1;
      letter-spacing: 0.01em;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Королёв Артём</h1>
    <p class="role">
      <span class="accent">Product Manager</span> в Wildberries
    </p>

    <div class="actions">
      <!-- Замени ссылку на свой Telegram (https://t.me/твой_ник) -->
      <a class="glass-btn" href="https://t.me/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M21.94 4.3 18.9 19.04c-.23 1.02-.84 1.27-1.7.79l-4.7-3.46-2.27 2.18c-.25.25-.46.46-.95.46l.34-4.78 8.7-7.86c.38-.34-.08-.53-.59-.19L6.7 13.1l-4.63-1.45c-1-.31-1.02-1 .21-1.49l18.1-6.98c.84-.31 1.57.2 1.3 1.12Z" />
        </svg>
        Telegram
      </a>
    </div>
  </main>

  <footer>© 2026 Артём Королёв</footer>
</body>
</html>
